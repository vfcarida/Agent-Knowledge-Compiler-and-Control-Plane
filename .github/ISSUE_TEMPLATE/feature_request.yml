name: Feature Request
description: Propose a new feature or enhancement for AKCP
title: "feat: <title>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Tip**: For early-stage ideas or brainstorming, consider posting in [Discussions](https://github.com/vfcarida/Agent-Knowledge-Compiler-and-Control-Plane/discussions/categories/ideas) first.

        **Note:** For minor enhancements, use this form. For major architectural changes, new compile targets, or normative spec changes, please submit an RFC instead by reading the [RFC Process](docs/governance/rfc-process.md).
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: What feature would you like to propose?
      placeholder: Describe the problem and proposed feature...
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale & Value
      description: Why is this feature valuable for the AKCP ecosystem?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative designs or workarounds you considered?
